server.port=8081
spring.application.name=gestion-pacientes

# --- CONFIGURACIÓN DE BASE DE DATOS (LARAGON)
spring.datasource.url=jdbc:mysql://localhost:3306/db_paciente_service?rewriteBatchedStatements=true&useSSL=false&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CONFIGURACIÓN DE JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- OPTIMIZACIÓN PARA CARGA MASIVA
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.open-in-view=false

# --- MIGRACIONES CON FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true

# --- SEGURIDAD JWT
jwt.secret=EstaEsUnaClaveSecretaMuyLargaYSeguraParaSaludPlus2026_JoseCuevas
jwt.expiration=86400000

# --- COMPATIBILIDAD Y RUTAS
spring.cloud.compatibility-verifier.enabled=false
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# --- CONFIGURACIÓN SWAGGER
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/saludplus-pacientes-docs.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.SaludPlus.gestion_pacientes.controller
springdoc.override-with-generic-response=true

# --- PERSONALIZACIÓN DE LA INTERFAZ
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.default-models-expand-depth=1

# --- CONFIGURACIÓN DE ERRORES 
server.error.include-message=always
server.error.include-binding-errors=always

# --- LOGS PARA DEBUGGING
logging.level.org.springframework.security=INFO
logging.level.org.springdoc=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE